name: CI-CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Coverage
        run: npx jest --coverage || true
  lint:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "Lint not configured"
  docker:
    runs-on: ubuntu-latest
    needs: [build-test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker image
        run: docker build -t devsu-demo:${{ github.sha }} .

      - name: Tag Docker image
        run: docker tag devsu-demo:${{ github.sha }} ${{ secrets.DOCKER_USER }}/devsu-demo:${{ github.sha }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USER }}/devsu-demo:${{ github.sha }}

  security:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USER }}/devsu-demo:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to cluster..."
          kubectl apply -f k8s/
